name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Asset names follow `compiler/RELEASING.md`:
#   quonec-<os>-<arch>.tar.gz
# with os in {macos, linux, windows} and arch in {x86_64, arm64}.
jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release', quonec_os: 'macos',   quonec_arch: 'arm64'}
          - {os: ubuntu-latest,  r: 'release', quonec_os: 'linux',   quonec_arch: 'x86_64'}
          - {os: ubuntu-latest,  r: 'devel',   quonec_os: 'linux',   quonec_arch: 'x86_64'}
          - {os: windows-latest, r: 'release', quonec_os: 'windows', quonec_arch: 'x86_64'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - name: Install quonec from the sibling repo (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          asset="quonec-${{ matrix.config.quonec_os }}-${{ matrix.config.quonec_arch }}.tar.gz"
          url="https://github.com/quone-lang/compiler/releases/latest/download/$asset"
          mkdir -p "$HOME/.cache/quone"
          if curl -sSLf "$url" -o quonec.tar.gz; then
            tar -xzf quonec.tar.gz -C "$HOME/.cache/quone"
            chmod +x "$HOME/.cache/quone/quonec"
            echo "QUONEC=$HOME/.cache/quone/quonec" >> "$GITHUB_ENV"
          else
            echo "::warning::Could not download $asset; skipping integration tests"
          fi
      - name: Install quonec from the sibling repo (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "quonec-${{ matrix.config.quonec_os }}-${{ matrix.config.quonec_arch }}.tar.gz"
          $url = "https://github.com/quone-lang/compiler/releases/latest/download/$asset"
          $cache = "$env:LOCALAPPDATA\quone"
          New-Item -ItemType Directory -Force -Path $cache | Out-Null
          try {
            Invoke-WebRequest -Uri $url -OutFile quonec.tar.gz -UseBasicParsing
            tar -xzf quonec.tar.gz -C $cache
            "QUONEC=$cache\quonec.exe" | Out-File -FilePath $env:GITHUB_ENV -Append
          } catch {
            Write-Warning "Could not download $asset; skipping integration tests"
          }
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
